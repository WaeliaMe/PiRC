name: Pi Hybrid Token CI/CD & Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test Python + Solidity
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Python Tests
        run: |
          if [ -d tests ]; then
            pytest tests/
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node.js Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Run Solidity / Hardhat Tests
        run: |
          if [ -f hardhat.config.js ]; then
            npx hardhat test
          fi

  deploy-testnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    name: Deploy Contracts to Testnet
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Deploy to Testnet
        env:
          PRIVATE_KEY: ${{ secrets.TESTNET_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.TESTNET_RPC_URL }}
        run: |
          if [ -f hardhat.config.js ]; then
            npx hardhat run scripts/deploy.js --network testnet
          fi

  deploy-mainnet:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy Contracts to Mainnet
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Deploy to Mainnet
        env:
          PRIVATE_KEY: ${{ secrets.MAINNET_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
        run: |
          if [ -f hardhat.config.js ]; then
            npx hardhat run scripts/deploy.js --network mainnet
          fi

  workflow-visualization:
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-testnet]
    name: CI/CD + Deployment Flowchart
    steps:
      - name: Generate Mermaid Diagram
        run: |
          echo '```mermaid
          flowchart TD
              A[Start: Push / PR] --> B[Build & Test Python + Solidity]
              B --> C{Tests Passed?}
              C -- No --> D[Fail Workflow & Notify]
              C -- Yes --> E[Deploy to Testnet]
              E --> F{Approval?}
              F -- No --> G[Hold Deployment]
              F -- Yes --> H[Deploy to Mainnet]
              H --> I[Update Hybrid Token Docs & Contracts]
              I --> J[End: CI/CD Complete]
          ```' > ci-cd-flowchart.md
