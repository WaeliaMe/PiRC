name: Pi Hybrid Token CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install Python dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4️⃣ Run Python tests
      - name: Run Python Tests
        run: |
          if [ -d tests ]; then pytest tests/; fi

      # 5️⃣ Set up Node.js (Solidity/JS tooling)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 6️⃣ Install project dependencies
      - name: Install Node Dependencies
        run: |
          if [ -f package.json ]; then npm install; fi

      # 7️⃣ Run Solidity / Hardhat tests
      - name: Run Solidity Tests
        run: |
          if [ -f hardhat.config.js ]; then npx hardhat test; fi

      # ✅ Optional: Build / Lint / Other checks can be added here
